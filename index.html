<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SubTrack - Buat Akun</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
}
</style>
</head>

<body>

<div id="firstScreen" style="
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  padding:20px;
">

  <div style="
    background:white;
    width:100%;
    max-width:420px;
    border-radius:16px;
    padding:24px;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
    text-align:center;
  ">

    <div style="font-size:40px;">🎉</div>

    <h2 style="margin:10px 0;color:#111;">
      Akun Berhasil Dibuat
    </h2>

    <p style="color:#666;font-size:13px;">
      Simpan ID ini untuk login kembali ke aplikasi
    </p>

    <div style="
      margin:15px 0;
      padding:15px;
      border-radius:12px;
      background:#f1f5f9;
      border:1px solid #e2e8f0;
    ">

      <p style="margin:0;font-size:12px;color:#64748b;">
        USER ID ANDA
      </p>

      <h1 id="showUserId" style="
        margin:5px 0;
        font-size:24px;
        letter-spacing:2px;
        color:#0f172a;
      ">
        ...
      </h1>

      <button onclick="copyUserId()" style="
        margin-top:8px;
        padding:8px 12px;
        border:none;
        border-radius:8px;
        background:#2563eb;
        color:white;
        font-size:13px;
        cursor:pointer;
      ">
        📋 Copy ID
      </button>

    </div>

    <p style="font-size:12px;color:#94a3b8;">
      Jangan sampai hilang ya, ID ini dipakai untuk login
    </p>

    <button onclick="goLogin()" style="
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#16a34a;
      color:white;
      font-weight:bold;
      cursor:pointer;
      margin-top:10px;
    ">
      Lanjut ke Login
    </button>

  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
'https://utqitfrtfywdfizlbrdf.supabase.co',
'sb_publishable_ObAPMsINwyKjSwqxpbK3FQ_on2dgOJv'
);

const showUserId = document.getElementById('showUserId');

let currentUserId = "";

// 🔢 GENERATE ID
function generateId(number){
  return "USR" + String(number).padStart(3,'0');
}

// 🚀 BUAT USER BARU
async function createUser(){
  // ambil jumlah user sekarang
  const { data } = await supabase
    .from('users')
    .select('id', { count:'exact' });

  const total = data.length + 1;
  const newUserId = generateId(total);

  currentUserId = newUserId;

  // simpan ke database
  await supabase.from('users').insert([{
    user_id: newUserId,
    is_active: false
  }]);

  showUserId.textContent = newUserId;
}

// 📋 COPY
window.copyUserId = function(){
  navigator.clipboard.writeText(currentUserId);
  alert("ID berhasil disalin");
}

// ➡️ KE LOGIN
window.goLogin = function(){
  window.location.href = "login.html";
}

// INIT
createUser();
</script>

</body>
</html>
