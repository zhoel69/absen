<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Kerja</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:Roboto;background:#e0f7fa;}
.app{max-width:600px;margin:auto;padding:15px;}
.card{background:white;padding:15px;border-radius:12px;margin-top:10px;}
input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:6px;border:1px solid #ccc;}
button{border:none;color:white;font-weight:bold;cursor:pointer;}
.btn1{background:#4caf50;}
.btn2{background:#f44336;}
.btn3{background:#ff9800;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border:1px solid #ccc;padding:6px;text-align:center;}
th{background:#80deea;}
.statusMasuk{background:#c8e6c9;}
.statusTidak{background:#ffcdd2;}
.statusLibur{background:#ffe0b2;}
.summary{margin-top:10px;font-weight:bold;color:#0d47a1;}
</style>
</head>

<body>

<div class="app">

<h2>Jadwal Kerja Harian</h2>

<div class="card">
  <input type="date" id="tgl">
  <select id="shift">
    <option>Shift 1</option>
    <option>Shift 2</option>
    <option>Shift 3</option>
    <option>Libur</option>
  </select>

  <button class="btn1" onclick="add('Masuk')">Masuk</button>
  <button class="btn2" onclick="add('Tidak Masuk')">Tidak</button>
  <button class="btn3" onclick="add('Libur')">Libur</button>
</div>

<div class="card">
<table>
<thead>
<tr>
  <th>Tanggal</th>
  <th>Shift</th>
  <th>Status</th>
</tr>
</thead>
<tbody id="body"></tbody>
</table>

<div class="summary" id="sum"></div>
</div>

</div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
"https://utqitfrtfywdfizlbrdf.supabase.co",
"sb_publishable_ObAPMsINwyKjSwqxpbK3FQ_on2dgOJv"
);

// USER ID WAJIB
const url = new URLSearchParams(location.search);
const user_id = url.get("user_id");

if(!user_id){
  location.href = "login.html";
}

const tgl = document.getElementById("tgl");
const shift = document.getElementById("shift");
const body = document.getElementById("body");
const sum = document.getElementById("sum");

let data = [];

// auto date
function today(){
  return new Date().toISOString().split("T")[0];
}

function setDate(){
  tgl.value = today();
  tgl.max = today();
}

async function load(){
  const res = await supabase
    .from("attendance")
    .select("*")
    .eq("user_id", user_id)
    .order("tgl",{ascending:true});

  data = res.data || [];
  render();
}

async function add(status){
  const exist = data.find(d => d.tgl === tgl.value && d.shift === shift.value);
  if(exist) return alert("Sudah ada");

  const res = await supabase.from("attendance").insert([{
    user_id,
    tgl: tgl.value,
    shift: shift.value,
    status
  }]).select();

  data.push(res.data[0]);
  render();
}

function render(){
  body.innerHTML = "";

  let m=0,t=0,l=0;

  data.forEach(d=>{
    let cls = "statusLibur";
    if(d.status==="Masuk"){cls="statusMasuk";m++}
    if(d.status==="Tidak Masuk"){cls="statusTidak";t++}
    if(d.status==="Libur")l++;

    body.innerHTML += `
      <tr>
        <td>${d.tgl}</td>
        <td>${d.shift}</td>
        <td class="${cls}">${d.status}</td>
      </tr>
    `;
  });

  sum.innerText = `Masuk:${m} | Tidak:${t} | Libur:${l}`;
}

window.onload = ()=>{
  setDate();
  load();
}
</script>

</body>
</html>
