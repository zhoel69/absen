<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Login SubTrack</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;font-family:'Roboto',sans-serif;}
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e293b);
}

.container{
  background:white;
  width:100%;
  max-width:400px;
  padding:25px;
  border-radius:16px;
  box-shadow:0 20px 50px rgba(0,0,0,0.4);
  text-align:center;
}

h2{margin:0 0 10px;color:#111;}
p{font-size:13px;color:#666;}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:14px;
  text-align:center;
  letter-spacing:2px;
}

button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:#16a34a;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:active{transform:scale(0.97);}

#toast{
  margin-top:10px;
  font-size:12px;
  color:red;
}
</style>
</head>

<body>

<div class="container">

  <h2>Login SubTrack</h2>
  <p>Masukkan User ID Anda</p>

  <input type="text" id="userIdInput" placeholder="Contoh: USR001">

  <button onclick="login()">Masuk</button>

  <div id="toast"></div>

</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
'https://utqitfrtfywdfizlbrdf.supabase.co',
'sb_publishable_ObAPMsINwyKjSwqxpbK3FQ_on2dgOJv'
);

const input = document.getElementById('userIdInput');
const toast = document.getElementById('toast');

async function login() {
  const userId = input.value.trim();

  if (!userId) {
    toast.textContent = "User ID wajib diisi";
    return;
  }

  // 🔍 CEK USER
  const { data, error } = await supabase
    .from('users')
    .select('*')
    .eq('user_id', userId)
    .single();

  if (error || !data) {
    toast.textContent = "User tidak ditemukan";
    return;
  }

  // 🔐 CEK AKTIF
  if (!data.is_active) {
    window.location.href = "inactive.html?user_id=" + userId;
    return;
  }

  // ✅ MASUK KE DASHBOARD
  window.location.href = "dashboard.html?user_id=" + userId;
}
</script>

</body>
</html>
